name: release-cli

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish, for example v0.1.2'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      package_file: ${{ steps.pack.outputs.package_file }}
      package_sha: ${{ steps.pack.outputs.package_sha }}
      package_version: ${{ steps.version.outputs.package_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate release tag matches package version
        id: version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${EXPECTED_TAG}" != "${RELEASE_TAG}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package.json version ${PACKAGE_VERSION}" >&2
            exit 1
          fi
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run build

      - name: Pack CLI tarball
        id: pack
        run: |
          mkdir -p .release-artifacts
          npm pack --pack-destination .release-artifacts >/dev/null
          PACKAGE_PATH="$(find .release-artifacts -maxdepth 1 -type f -name 'marky-*.tgz' | head -n 1)"
          if [ -z "$PACKAGE_PATH" ]; then
            echo "Expected a marky-*.tgz artifact in .release-artifacts" >&2
            exit 1
          fi
          PACKAGE_FILE="$(basename "$PACKAGE_PATH")"
          PACKAGE_SHA="$(shasum -a 256 ".release-artifacts/${PACKAGE_FILE}" | awk '{print $1}')"
          echo "package_file=${PACKAGE_FILE}" >> "$GITHUB_OUTPUT"
          echo "package_sha=${PACKAGE_SHA}" >> "$GITHUB_OUTPUT"
          printf '%s  %s\n' "${PACKAGE_SHA}" "${PACKAGE_FILE}" > ".release-artifacts/${PACKAGE_FILE}.sha256"

      - name: Upload workflow release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-cli-assets-${{ steps.version.outputs.package_version }}
          path: .release-artifacts/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: |
            .release-artifacts/*.tgz
            .release-artifacts/*.sha256

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: release
    env:
      PACKAGE_SHA: ${{ needs.release.outputs.package_sha }}
      PACKAGE_VERSION: ${{ needs.release.outputs.package_version }}
      RELEASE_TAG: ${{ needs.release.outputs.release_tag }}
      SOURCE_REPO: ${{ github.repository }}
      TAP_REPO: romankarski/homebrew-marky
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - name: Check tap token availability
        id: token_check
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn when tap automation is disabled
        if: ${{ steps.token_check.outputs.configured != 'true' }}
        run: echo "::warning::HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap update."

      - name: Checkout Marky automation scripts
        if: ${{ steps.token_check.outputs.configured == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main
          path: marky

      - name: Checkout tap repository
        if: ${{ steps.token_check.outputs.configured == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Setup Node
        if: ${{ steps.token_check.outputs.configured == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Seed formula file when tap is empty
        if: ${{ steps.token_check.outputs.configured == 'true' }}
        run: |
          mkdir -p homebrew-tap/Formula
          if [ ! -f homebrew-tap/Formula/marky.rb ]; then
            cp marky/packaging/homebrew/marky.rb homebrew-tap/Formula/marky.rb
          fi

      - name: Update Homebrew formula
        if: ${{ steps.token_check.outputs.configured == 'true' }}
        run: |
          node marky/scripts/update-homebrew-formula.mjs \
            --formula homebrew-tap/Formula/marky.rb \
            --repo "${SOURCE_REPO}" \
            --version "${PACKAGE_VERSION}" \
            --sha "${PACKAGE_SHA}"

      - name: Commit and push tap update
        if: ${{ steps.token_check.outputs.configured == 'true' }}
        run: |
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git -C homebrew-tap diff --quiet -- Formula/marky.rb; then
            echo "Formula already up to date"
            exit 0
          fi
          git -C homebrew-tap add Formula/marky.rb
          git -C homebrew-tap commit -m "Update marky ${PACKAGE_VERSION}"
          git -C homebrew-tap push origin HEAD:main
