name: release-cli

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish, for example v0.1.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate release tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${EXPECTED_TAG}" != "${RELEASE_TAG}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package.json version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run build

      - name: Pack CLI tarball
        id: pack
        run: |
          mkdir -p .release-artifacts
          npm pack --pack-destination .release-artifacts >/dev/null
          PACKAGE_PATH="$(find .release-artifacts -maxdepth 1 -type f -name 'marky-*.tgz' | head -n 1)"
          if [ -z "$PACKAGE_PATH" ]; then
            echo "Expected a marky-*.tgz artifact in .release-artifacts" >&2
            exit 1
          fi
          PACKAGE_FILE="$(basename "$PACKAGE_PATH")"
          echo "package_file=${PACKAGE_FILE}" >> "$GITHUB_OUTPUT"
          shasum -a 256 ".release-artifacts/${PACKAGE_FILE}" > ".release-artifacts/${PACKAGE_FILE}.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: |
            .release-artifacts/*.tgz
            .release-artifacts/*.sha256
